name: GitHub-Profile-Summary-Cards

on:
  schedule:
    # Runs every 24 hours
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually at any time

# The action commits the generated cards back to the repo,
# so the default GITHUB_TOKEN needs write access to contents.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards

    steps:
      - uses: actions/checkout@v4
      
      - uses: vn7n24f1tr/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
